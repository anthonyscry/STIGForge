name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore STIGForge.sln --locked-mode

      - name: Build
        run: dotnet build STIGForge.sln --no-restore -c Release

      - name: Test
        run: >
          dotnet test STIGForge.sln
          --no-build
          -c Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Coverage gate
        run: |
          $files = Get-ChildItem -Recurse -Path TestResults -Filter coverage.cobertura.xml
          $totalLines = 0; $coveredLines = 0
          foreach ($file in $files) {
            $xml = [xml](Get-Content $file.FullName -Raw)
            $totalLines  += [int]$xml.coverage.'lines-valid'
            $coveredLines += [int]$xml.coverage.'lines-covered'
          }
          $lineRate = if ($totalLines -gt 0) { $coveredLines / $totalLines } else { 1.0 }
          Write-Host "Line coverage: $([math]::Round($lineRate * 100, 2))% ($coveredLines/$totalLines lines)"
          if ($lineRate -lt 0.35) {
            Write-Error "Coverage $([math]::Round($lineRate * 100, 2))% is below the 35% gate"
            exit 1
          }
        shell: pwsh

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/

      - name: Publish CLI
        if: github.ref == 'refs/heads/main'
        run: >
          dotnet publish src/STIGForge.Cli/STIGForge.Cli.csproj
          -c Release
          --no-build
          -o artifacts/cli

      - name: Upload CLI artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: stigforge-cli
          path: artifacts/cli/
